          application/json:
            schema:
              type: object
              required: [currency, bank_code, account_number, account_name]
              properties:
                currency: { type: string, example: NGN }
                bank_code: { type: string, example: "044" }
                account_number: { type: string, example: "0123456789" }
                account_name: { type: string, example: "Ada Lovelace" }
      responses:
        "200":
          description: Saved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/BankAccount' }
    get:
      tags: [Sender — Merchant (Tapp)]
      summary: Get the merchant's saved bank account
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Bank. }
        "404": { description: Not set. }

  /v1/sender/me/tap:
    post:
      tags: [Sender — Merchant (Tapp)]
      summary: One-shot PaymentOrder for a phone-to-phone tap
      description: |
        Server auto-picks USDC-on-Sui as the rail, derives crypto
        amount from the fiat currency's current MarketRate, populates
        the recipient from the saved MerchantBankAccount, returns a
        checkout URL the merchant phone broadcasts via NFC HCE / QR.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { $ref: '#/components/schemas/DecimalString' }
                currency: { type: string, example: NGN, default: NGN }
                memo: { type: string }
      responses:
        "201":
          description: Tap initiated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/TapPaymentResponse' }
        "412": { description: Bank account not set. }
        "424": { description: Market rate unavailable. }

  /v1/sender/me/payments/stream:
    get:
      tags: [Sender — Merchant (Tapp)]
      summary: SSE — real-time `payment.*` events for this merchant
      description: |
        `text/event-stream`. Server emits events as they happen, scoped
        to the authenticated sender. Headers:

        ```
        Accept: text/event-stream
        Authorization: Bearer <access_token>
        ```

        Events: `payment.deposited`, `payment.settled`, `payment.refunded`.
        Heartbeats every 25s. Client honors `Last-Event-ID` on reconnect.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Stream opened.
          content:
            text/event-stream:
              schema: { type: string }

  # ----- Sender — Tap Card -----
  /v1/sender/me/tap-card/nonce:
    get:
      tags: [Sender — Tap Card]
      summary: Resolve auth tier + issue a single-use nonce
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: amount
          required: true
          schema: { $ref: '#/components/schemas/DecimalString' }
        - in: query
          name: card_uid_hash
          required: true
          schema: { $ref: '#/components/schemas/HexString' }
      responses:
        "200":
          description: Nonce + tier.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/TapCardNonce' }
        "404": { description: Card not found / not live. }

  /v1/sender/me/tap-card:
    post:
      tags: [Sender — Tap Card]
      summary: Debit a Tap Card (strict state machine — see spec)
      description: |
        Atomic state machine per `rails/docs/tapp-card-spec.md`:

        1. Consume `server_nonce` (atomic UPDATE, defeats replay).
        2. Card lookup by `card_uid_hash`.
        3. Token match (no sliding window).
        4. Tier check (`none` / `pin` / `step_up`).
        5. Daily-limit pre-check.
        6. Create `PaymentOrder`.
        7. Submit `tapp_card::debit<T>` PTB.
        8. Rotate token.

        Token rotation only fires inside the success branch — failed
        PIN never advances state, so cloned cards without the PIN
        cannot burn the legit user's card.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TapCardDebitRequest' }
      responses:
        "200":
          description: Debited.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/TapCardDebitResponse' }
        "401": { description: Nonce consumed / expired. }
        "402":
          description: |
            Soft block — either `step_up_required` (with token), or
            `daily_limit_exceeded`. Client branches on `data.code`.
        "403":
          description: |
            `token_invalid_resync_required`, `pin_invalid`, or step-up
            grant missing.
        "404": { description: Card unrecognized. }

  /v1/sender/me/tap-card/{order_id}/token-ack:
    post:
      tags: [Sender — Tap Card]
      summary: Acknowledge the rotation-token write to the card
      description: |
        `written: false` flips the card's `needs_resync` flag so the
        cardholder PWA dashboard surfaces the resync prompt next time.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: order_id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [written]
              properties:
                written: { type: boolean }
      responses: { "200": { description: Acknowledged. } }

  /v1/sender/me/tap-card/step-up:
    get:
      tags: [Sender — Tap Card]
      summary: Poll the step-up grant state for a debit
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Status of the step-up grant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [pending, granted, denied, expired]

