          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            symbol: { type: string }
                            contract_address: { type: string }
                            decimals: { type: integer }
                            is_enabled: { type: boolean }

  /v1/admin/config/tokens/{id}:
    patch:
      tags: [Admin — Config]
      summary: Toggle a token's status
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_enabled]
              properties:
                is_enabled: { type: boolean }
      responses:
        "200":
          description: Token updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          is_enabled: { type: boolean }

  /v1/admin/config/networks:
    get:
      tags: [Admin — Config]
      summary: List configured networks
      security: [{ adminToken: [] }]
      responses:
        "200":
          description: Configured networks retrieved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            identifier: { type: string }
                            rpc_endpoint: { type: string }
                            is_testnet: { type: boolean }
                            fee: { type: string }

  /v1/admin/config/providers:
    get:
      tags: [Admin — Config]
      summary: List provider/LP configurations
      security: [{ adminToken: [] }]
      responses:
        "200":
          description: Provider profiles retrieved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: string }
                            trading_name: { type: string }
                            is_active: { type: boolean }
                            is_available: { type: boolean }
                            is_kyb_verified: { type: boolean }
                            safehaven_account_number: { type: string }

  /v1/admin/config/providers/{id}:
    patch:
      tags: [Admin — Config]
      summary: Update a provider's activation/KYB status or Safe Haven account mapping
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_active: { type: boolean }
                is_kyb_verified: { type: boolean }
                safehaven_account_number: { type: string }
      responses:
        "200":
          description: Provider updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          is_active: { type: boolean }
                          is_kyb_verified: { type: boolean }
                          safehaven_account_number: { type: string }

  /v1/admin/config/params:
    get:
      tags: [Admin — Config]
      summary: Get env-backed static params (read-only)
      security: [{ adminToken: [] }]
      responses:
        "200":
          description: Static params retrieved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          base_sender_fee_bps: { type: integer }
                          percent_deviation_from_external_rate: { type: string }
                          percent_deviation_from_market_rate: { type: string }
                          order_fulfillment_validity: { type: string }
                          receive_address_validity: { type: string }
                          order_request_validity: { type: string }
                          refund_cancellation_count: { type: integer }
                          base_chain_id: { type: integer }

  /v1/admin/orders/{id}/refund:
    post:
      tags: [Admin — Refunds]
      summary: Mark a payment order as refunded (reconciliation state update)
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [justification]
              properties:
                justification: { type: string }
                confirm: { type: boolean, default: false }
      responses:
        "200":
          description: Order marked refunded or dry-run details.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          order_id: { type: string }
                          previous: { type: string }
                          current: { type: string }
                          justification: { type: string }

  # ----- Admin — Users -----
  /v1/admin/users:
    get:
      tags: [Admin — Users]
      summary: List users (paginated, filterable)
      security: [{ adminToken: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 10 }
        - in: query
          name: scope
          schema: { type: string, enum: [sender, provider, cardholder] }
        - in: query
          name: search
          description: Case-insensitive match on email or first/last name.
          schema: { type: string }
        - in: query
          name: verified
          schema: { type: boolean }
        - in: query
          name: early_access
          schema: { type: boolean }
      responses:
        "200":
          description: Paginated user list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          total: { type: integer }
                          page: { type: integer }
                          count: { type: integer }
                          users:
                            type: array
                            items: { $ref: '#/components/schemas/AdminUser' }

  /v1/admin/users/{id}:
    get:
      tags: [Admin — Users]
      summary: Get a single user with profiles, KYC status, and order count
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          id: { type: string }
                          email: { type: string }
                          first_name: { type: string }
                          last_name: { type: string }
                          scope: { type: string }
                          is_email_verified: { type: boolean }
                          has_early_access: { type: boolean }
                          created_at: { type: string }
                          has_sender: { type: boolean }
                          has_provider: { type: boolean }
                          tapp_cards: { type: integer }
                          kyc_status: { type: string }
                          order_count: { type: integer }
        "404": { description: User not found. }
    patch:
      tags: [Admin — Users]
      summary: Update a user's scope, email-verified flag, or early access
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      requestBody:
        required: true
        description: Only provided fields are changed.
        content:
          application/json:
            schema:
              type: object
              properties:
                scope: { type: string }
                is_email_verified: { type: boolean }
                has_early_access: { type: boolean }
      responses:
        "200": { description: User updated. }
        "404": { description: User not found. }

  /v1/admin/users/{id}/revoke-sessions:
    post:
      tags: [Admin — Users]
      summary: Revoke all active refresh tokens (force re-auth / soft suspend)
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses:
        "200":
          description: Sessions revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          revoked: { type: integer }

  /v1/admin/users/{id}/early-access:
    patch:
      tags: [Admin — Users]
      summary: Set a user's early-access flag
      security: [{ adminToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [has_early_access]
              properties:
                has_early_access: { type: boolean }
      responses:
        "200": { description: Early access updated. }
        "404": { description: User not found. }

  # ----- Admin — Stats -----
  /v1/admin/stats:
    get:
      tags: [Admin — Stats]
      summary: Platform overview — counts and volumes
      security: [{ adminToken: [] }]
      responses:
        "200":
          description: Headline platform stats.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          users: { type: integer }
                          senders: { type: integer }
                          providers: { type: integer }
                          active_providers: { type: integer }
                          kyb_verified: { type: integer }
                          orders_total: { type: integer }
                          orders_by_status:
                            type: object
                            additionalProperties: { type: integer }
                          settled_volume: { type: string }
                          lock_orders_total: { type: integer }
                          lock_orders_settled: { type: integer }

  # ----- Admin — Treasury -----
  /v1/admin/treasury/overview:
    get:
      tags: [Admin — Treasury]
      summary: Consolidated treasury — wallet balances + DB value summary
      security: [{ adminToken: [] }]
      responses:
        "200":
          description: Treasury overview.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          wallets:
                            type: object
                            properties:
                              base_aggregator: { type: object }
                              sui_aggregator: { type: object }
                              safehaven: { type: object }
                          summary:
                            type: object
                            properties:
                              settled_volume: { type: string }
                              refunded_total: { type: string }
                              in_flight_value: { type: string }

  # ----- Admin — Audit -----
  /v1/admin/audit-logs:
    get:
      tags: [Admin — Audit]
      summary: List admin audit-trail entries (newest first)
      security: [{ adminToken: [] }]
      parameters:
        - in: query
          name: action
          description: Exact dotted action, e.g. funding.transfer.
          schema: { type: string }
        - in: query
          name: target
          description: Exact target id.
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: Audit log entries.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          count: { type: integer }
                          logs:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string }
                                actor: { type: string }
                                action: { type: string }
                                target: { type: string }
                                detail: { type: object }
                                created_at: { type: string }

  # ----- Provider -----
  /v1/provider/orders:
    get:
      tags: [Provider]
      summary: List LockPaymentOrders assigned to this provider
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: List. } }

  /v1/provider/orders/{id}/accept:
    post:
      tags: [Provider]
      summary: Accept a LockPaymentOrder
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses: { "200": { description: Accepted. } }

  /v1/provider/orders/{id}/decline:
    post:
      tags: [Provider]
      summary: Decline a LockPaymentOrder
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses: { "200": { description: Declined. } }

  /v1/provider/orders/{id}/fulfill:
    post:
      tags: [Provider]
      summary: Mark a LockPaymentOrder as fiat-fulfilled
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses: { "200": { description: Fulfilled. } }

  /v1/provider/orders/{id}/cancel:
    post:
      tags: [Provider]
      summary: Cancel a LockPaymentOrder
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses: { "200": { description: Cancelled. } }

  /v1/provider/rates/{token}/{fiat}:
    get:
      tags: [Provider]
      summary: Get the LP-side market rate for a token/fiat pair
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
        - in: path
          name: fiat
          required: true
          schema: { type: string }
      responses: { "200": { description: Rate. } }

  /v1/provider/stats:
    get:
      tags: [Provider]
      summary: Provider activity stats
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: Stats. } }

  /v1/provider/node-info:
    get:
      tags: [Provider]
      summary: Aggregator metadata the LP node needs at boot
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: Info. } }
