      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CardLinkCompleteRequest' }
      responses:
        "200":
          description: Card status flipped to `live`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          card_id: { $ref: '#/components/schemas/UUID' }
                          status: { type: string, enum: [live] }
        "400":
          description: Validation / on-chain verify failed (`tx_verify_failed`, `coin_type_mismatch`, …).

  /v1/cards/me:
    get:
      tags: [Cards — Cardholder (PWA)]
      summary: Cardholder dashboard summary
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Single card summary.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/CardSummary' }
        "404": { description: No card linked. }

  /v1/cards/top-up:
    post:
      tags: [Cards — Cardholder (PWA)]
      summary: Return the PTB skeleton for `tapp_card::top_up`
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount_subunit]
              properties:
                amount_subunit: { type: integer, format: int64 }
      responses:
        "200":
          description: Skeleton for the PWA to zkLogin-sign.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/PtbSkeleton' }

  /v1/cards/revoke:
    post:
      tags: [Cards — Cardholder (PWA)]
      summary: Return the PTB skeleton for `tapp_card::set_revoked(true)`
      description: |
        Optimistically flips the local status to `revoked`; PWA signs
        + submits the on-chain call. The indexer reconciles when the
        on-chain state changes.
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Skeleton.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/PtbSkeleton' }

  /v1/cards/me/resync:
    post:
      tags: [Cards — Cardholder (PWA)]
      summary: Torn-write recovery — issue the canonical token + one-shot nonce
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Resync payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ResyncPayload' }

  /v1/cards/me/resync/complete:
    post:
      tags: [Cards — Cardholder (PWA)]
      summary: Confirm the PWA wrote the canonical token back to the card
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resync_nonce]
              properties:
                resync_nonce: { type: string }
      responses:
        "200": { description: needs_resync cleared. }
        "401": { description: Nonce invalid or expired. }

  /v1/cards/me/step-up/grant:
    post:
      tags: [Cards — Cardholder (PWA)]
      summary: Cardholder approval of an above-threshold debit
      description: |
        Hit by the PWA after the cardholder completes WebAuthn /
        biometric. Flips `step_up_granted_at` on the matching
        CardServerNonce so the merchant-side poll returns granted.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string, description: step_up_token from the merchant /nonce response. }
                webauthn_assertion:
                  type: object
                  additionalProperties: true
      responses:
        "200": { description: Granted. }
        "404": { description: Token not for this account. }
        "410": { description: Token expired. }

