          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                market_rate: { type: string }
                is_enabled: { type: boolean }
      responses:
        "200":
          description: Currency updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Envelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          market_rate: { type: string }
                          is_enabled: { type: boolean }

  /v1/admin/config/tokens:
